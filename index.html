<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Owl Tracker">
<meta name="theme-color" content="#080812">
<link rel="manifest" href="manifest.json">
<title>🦉 Pokémon Owl Tracker</title>
<style>
:root {
  --bg:      #080812;
  --s1:      #0f0f1e;
  --s2:      #16162a;
  --s3:      #1e1e38;
  --border:  #2a2a50;
  --border2: #3a3a68;
  --text:    #e8e8f8;
  --text2:   #8888b0;
  --text3:   #4a4a78;
  --gold:    #f0c040;
  --gold2:   #c09020;
  --purple:  #9060e0;
  --purple2: #6040b0;
  --green:   #30d080;
  --green2:  #1a8050;
  --red:     #e05050;
  --blue:    #4090f0;
  --amber:   #e09030;
  --teal:    #30c0c0;
  --pink:    #e060a0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}

/* ── SET SWITCHER ─────────────────────────── */
.set-nav{
  position:sticky;top:0;z-index:200;
  background:rgba(8,8,18,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding-top:env(safe-area-inset-top);
}
.set-tabs{
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.set-tabs::-webkit-scrollbar{display:none}
.set-tab{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:10px 16px 8px;border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;transition:all 0.2s;
  min-width:80px;
}
.set-tab .tab-icon{font-size:20px;margin-bottom:3px}
.set-tab .tab-label{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3)}
.set-tab.active .tab-label{color:var(--gold)}
.set-tab.active{border-bottom-color:var(--gold)}
.set-tab.t-noctowl.active{border-bottom-color:#9060e0}
.set-tab.t-noctowl.active .tab-label{color:#9060e0}
.set-tab.t-hoothoot.active{border-bottom-color:var(--teal)}
.set-tab.t-hoothoot.active .tab-label{color:var(--teal)}
.set-tab.t-surfing.active{border-bottom-color:var(--blue)}
.set-tab.t-surfing.active .tab-label{color:var(--blue)}
.set-tab.t-cameo.active{border-bottom-color:var(--pink)}
.set-tab.t-cameo.active .tab-label{color:var(--pink)}

/* ── SET HEADER ───────────────────────────── */
.set-header{
  background:linear-gradient(135deg,var(--s1),var(--s2));
  padding:14px 16px 10px;border-bottom:1px solid var(--border);
}
.set-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.set-title{font-size:16px;font-weight:800;letter-spacing:-0.3px}
.set-title.c-noctowl{background:linear-gradient(135deg,#9060e0,#f0c040);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.set-title.c-hoothoot{background:linear-gradient(135deg,#30c0c0,#90e0e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.set-title.c-surfing{background:linear-gradient(135deg,#4090f0,#30d0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.set-title.c-cameo{background:linear-gradient(135deg,#e060a0,#f0c040);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.set-pct{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(240,192,64,0.1);color:var(--gold);border:1px solid rgba(240,192,64,0.25)}

.stat-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.stat-pills::-webkit-scrollbar{display:none}
.stat-pill{flex-shrink:0;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;text-align:center}
.sp-val{font-size:13px;font-weight:700;color:var(--gold)}
.sp-lab{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-top:1px}

.prog-bar-wrap{margin-top:10px}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.prog-track{height:4px;background:var(--s3);border-radius:2px}
.prog-fill{height:100%;border-radius:2px;transition:width 0.4s;box-shadow:0 0 6px currentColor}
.prog-fill.c-noctowl{background:linear-gradient(90deg,#6040b0,#f0c040);box-shadow:0 0 6px rgba(144,96,224,0.5)}
.prog-fill.c-hoothoot{background:linear-gradient(90deg,#20a0a0,#90e0e0);box-shadow:0 0 6px rgba(48,192,192,0.4)}
.prog-fill.c-surfing{background:linear-gradient(90deg,#2060c0,#30d0ff);box-shadow:0 0 6px rgba(64,144,240,0.4)}
.prog-fill.c-cameo{background:linear-gradient(90deg,#a04070,#f0c040);box-shadow:0 0 6px rgba(224,96,160,0.4)}

/* ── FILTERS ──────────────────────────────── */
.filter-row{
  display:flex;background:var(--s1);border-bottom:1px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:8px 12px;font-size:11px;font-weight:700;
  color:var(--text3);border:none;background:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;letter-spacing:0.03em;
}
.filter-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.search-wrap{padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--border)}
.search-input{
  width:100%;padding:8px 12px;border-radius:8px;
  border:1px solid var(--border2);background:var(--s2);
  font-size:14px;color:var(--text);outline:none;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--purple)}

/* ── CARD LIST ────────────────────────────── */
.card-list{padding:6px 10px 130px}
.section-lbl{
  padding:12px 4px 5px;font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);
  display:flex;align-items:center;gap:8px;
}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARD ROW ─────────────────────────────── */
.card-row{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;margin-bottom:7px;cursor:pointer;overflow:hidden;
  position:relative;transition:border-color 0.15s,background 0.15s;
}
.card-row:active{transform:scale(0.99)}
.card-row.collected{background:rgba(48,208,128,0.06);border-color:rgba(48,208,128,0.25)}
.card-row.special{border-color:rgba(240,192,64,0.3)}
.card-row.special::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.card-inner{display:flex;align-items:center;gap:10px;padding:9px 12px}
.card-img-wrap{
  width:50px;height:70px;flex-shrink:0;border-radius:5px;overflow:hidden;
  border:1px solid var(--border2);background:var(--s2);
  display:flex;align-items:center;justify-content:center;
}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.no-img{font-size:24px;opacity:0.4}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-row.collected .card-name{text-decoration:line-through;color:var(--text3)}
.card-set{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-num{font-size:10px;color:var(--text3);margin-top:1px}
.card-price{font-size:12px;font-weight:700;color:var(--green);margin-top:4px}
.badges{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;letter-spacing:0.04em;text-transform:uppercase}
.b-rare{background:rgba(240,192,64,0.15);color:var(--gold);border:1px solid rgba(240,192,64,0.3)}
.b-promo{background:rgba(144,96,224,0.15);color:#b080f0;border:1px solid rgba(144,96,224,0.3)}
.b-jp{background:rgba(64,144,240,0.15);color:#70a0f0;border:1px solid rgba(64,144,240,0.3)}
.b-en{background:rgba(48,208,128,0.12);color:#40c080;border:1px solid rgba(48,208,128,0.3)}
.b-1st{background:rgba(224,80,80,0.15);color:#e07070;border:1px solid rgba(224,80,80,0.3)}
.b-cameo{background:rgba(224,96,160,0.15);color:#e080c0;border:1px solid rgba(224,96,160,0.3)}
.b-vmax{background:rgba(200,80,200,0.15);color:#d080d0;border:1px solid rgba(200,80,200,0.3)}

.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.check-ring{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);
  background:var(--s2);display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.card-row.collected .check-ring{background:var(--green2);border-color:var(--green);box-shadow:0 0 8px rgba(48,208,128,0.35)}
.check-mark{display:none;color:#fff;font-size:13px;font-weight:800}
.card-row.collected .check-mark{display:block}
.expand-hint{font-size:9px;color:var(--text3);text-align:right;margin-top:2px;line-height:1.2}
.card-row.collected .expand-hint{color:var(--green2)}

/* ── EXPANDED DETAIL ──────────────────────── */
.card-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.card-row.open .card-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.detail-box{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.d-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.d-val{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.d-val.gold{color:var(--gold)}
.d-val.green{color:var(--green)}
.d-val.purple{color:#b080f0}
.detail-note{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.act-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 8px;border-radius:8px;font-size:11px;font-weight:600;
  text-decoration:none;border:none;cursor:pointer;letter-spacing:0.02em;
  transition:opacity 0.15s;
}
.act-btn:active{opacity:0.7}
.btn-tcg{background:rgba(64,144,240,0.12);color:var(--blue);border:1px solid rgba(64,144,240,0.3)}
.btn-pc{background:rgba(240,192,64,0.1);color:var(--gold);border:1px solid rgba(240,192,64,0.3)}
.btn-ebay{background:rgba(224,144,48,0.1);color:var(--amber);border:1px solid rgba(224,144,48,0.3)}
.btn-check{background:rgba(48,208,128,0.1);color:var(--green);border:1px solid rgba(48,208,128,0.3);width:100%;grid-column:1/-1}

/* ── BOTTOM BAR ───────────────────────────── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,18,0.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom));
  display:flex;gap:6px;
}
.bot-btn{
  flex:1;padding:9px 4px;border-radius:8px;
  border:1px solid var(--border2);background:var(--s2);
  font-size:10px;font-weight:700;cursor:pointer;color:var(--text2);
  letter-spacing:0.03em;
}
.bot-btn.danger{color:var(--red);border-color:rgba(224,80,80,0.3);background:rgba(224,80,80,0.07)}
.bot-btn:active{opacity:0.7}

/* ── EMPTY ────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:52px;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:15px;font-weight:600}
.empty-sub{font-size:12px;margin-top:6px;color:var(--text3)}

/* ── INSTALL BANNER ───────────────────────── */
.install-banner{
  display:none;margin:8px 10px;
  background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;padding:10px 12px;
  align-items:center;gap:10px;font-size:12px;
}
.ib-close{margin-left:auto;color:var(--text3);font-size:16px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<!-- SET NAVIGATION -->
<nav class="set-nav">
  <div class="set-tabs">
    <button class="set-tab t-noctowl active" onclick="switchSet('noctowl',this)">
      <span class="tab-icon">🦉</span>
      <span class="tab-label">Noctowl</span>
    </button>
    <button class="set-tab t-hoothoot" onclick="switchSet('hoothoot',this)">
      <span class="tab-icon">🐦</span>
      <span class="tab-label">Hoothoot</span>
    </button>
    <button class="set-tab t-surfing" onclick="switchSet('surfing',this)">
      <span class="tab-icon">🏄</span>
      <span class="tab-label">Surfing Pika</span>
    </button>
    <button class="set-tab t-cameo" onclick="switchSet('cameo',this)">
      <span class="tab-icon">🎭</span>
      <span class="tab-label">Cameos</span>
    </button>
  </div>
</nav>

<!-- SET HEADER -->
<div class="set-header">
  <div class="set-title-row">
    <div class="set-title c-noctowl" id="set-title">🦉 Noctowl Master Set</div>
    <div class="set-pct" id="set-pct">0%</div>
  </div>
  <div class="stat-pills">
    <div class="stat-pill"><div class="sp-val" id="sp-collected">0</div><div class="sp-lab">Collected</div></div>
    <div class="stat-pill"><div class="sp-val" id="sp-needed">0</div><div class="sp-lab">Needed</div></div>
    <div class="stat-pill"><div class="sp-val" id="sp-total">0</div><div class="sp-lab">Total</div></div>
    <div class="stat-pill"><div class="sp-val" id="sp-rare">0</div><div class="sp-lab">Rare/Promos</div></div>
    <div class="stat-pill"><div class="sp-val" id="sp-val">—</div><div class="sp-lab">Top Card $</div></div>
  </div>
  <div class="prog-bar-wrap">
    <div class="prog-info">
      <span id="prog-text">0 of 0 collected</span>
      <span id="prog-msg">Start hunting! 🎯</span>
    </div>
    <div class="prog-track"><div class="prog-fill c-noctowl" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filter-row" id="filter-row">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('en',this)">🇺🇸 English</button>
  <button class="filter-btn" onclick="setFilter('jp',this)">🇯🇵 Japanese</button>
  <button class="filter-btn" onclick="setFilter('needed',this)">Needed</button>
  <button class="filter-btn" onclick="setFilter('collected',this)">Collected</button>
  <button class="filter-btn" onclick="setFilter('rare',this)">⭐ Rare</button>
  <button class="filter-btn" onclick="setFilter('promo',this)">Promos</button>
</div>
<div class="search-wrap">
  <input class="search-input" type="search" placeholder="Search cards..." oninput="handleSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="install-banner" id="ib">
  <span style="font-size:20px">📱</span>
  <span style="flex:1;line-height:1.5"><strong style="color:var(--text)">Add to Home Screen</strong><br><span style="color:var(--text3)">Safari → Share → Add to Home Screen</span></span>
  <span class="ib-close" onclick="dismissBanner()">✕</span>
</div>

<div class="card-list" id="card-list"></div>

<div class="bottom-bar">
  <button class="bot-btn" onclick="markAllVisible(true)">✓ Check All</button>
  <button class="bot-btn" onclick="markAllVisible(false)">○ Uncheck</button>
  <button class="bot-btn danger" onclick="resetCurrent()">↺ Reset Set</button>
</div>

  searchQ = '';
  openId = null;
  document.querySelector('.search-input').value = '';
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  // Update header theme
  var s = SETS[name];
  document.getElementById('set-title').className = 'set-title c-'+s.cls;
  document.getElementById('set-title').textContent = s.label;
  document.getElementById('prog-fill').className = 'prog-fill c-'+s.cls;
  updateStats();
  renderList();
}

function updateStats(){
  var s = SETS[currentSet];
  var t = s.data.length;
  var d = collected[currentSet].size;
  var p = t ? Math.round(d/t*100) : 0;
  var rare = s.data.filter(function(c){return c.special||c.promo}).length;
  document.getElementById('set-pct').textContent = p+'%';
  document.getElementById('sp-collected').textContent = d;
  document.getElementById('sp-needed').textContent = t-d;
  document.getElementById('sp-total').textContent = t;
  document.getElementById('sp-rare').textContent = rare;
  document.getElementById('sp-val').textContent = s.topVal;
  document.getElementById('prog-text').textContent = d+' of '+t+' collected';
  document.getElementById('prog-fill').style.width = p+'%';
  var msg = p===100?'Complete! 🎉':p>75?'Almost there! 🔥':p>50?'Halfway 💪':p>25?'Keep going! 🎯':'Start hunting! 🦉';
  document.getElementById('prog-msg').textContent = msg;
}

function toggleCollected(id, e){
  e.stopPropagation();
  var cs = collected[currentSet];
  cs.has(id)?cs.delete(id):cs.add(id);
  save(); updateStats();
  var row = document.getElementById('cr-'+id);
  if(row){ row.classList.toggle('collected',cs.has(id)); row.querySelector('.expand-hint').textContent = cs.has(id)?'✓ Got it':'tap for info'; }
}

function toggleOpen(id){
  var row = document.getElementById('cr-'+id);
  if(!row) return;
  if(openId===id){ row.classList.remove('open'); openId=null; return; }
  if(openId){ var prev=document.getElementById('cr-'+openId); if(prev)prev.classList.remove('open'); }
  row.classList.add('open'); openId=id;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  openId=null; renderList();
}

function handleSearch(q){ searchQ=q.toLowerCase(); openId=null; renderList(); }

function getVisible(){
  var cs = collected[currentSet];
  return SETS[currentSet].data.filter(function(c){
    if(currentFilter==='en'&&c.lang!=='en') return false;
    if(currentFilter==='jp'&&c.lang!=='jp') return false;
    if(currentFilter==='needed'&&cs.has(c.id)) return false;
    if(currentFilter==='collected'&&!cs.has(c.id)) return false;
    if(currentFilter==='rare'&&!c.special&&!c.promo) return false;
    if(currentFilter==='promo'&&!c.promo) return false;
    if(searchQ&&!c.name.toLowerCase().includes(searchQ)&&!c.set.toLowerCase().includes(searchQ)&&!(c.num&&c.num.toLowerCase().includes(searchQ))) return false;
    return true;
  });
}

function buildRow(c){
  var cs = collected[currentSet];
  var isColl = cs.has(c.id);
  var isOpen = openId===c.id;
  var imgSrc = c.img || '';
  var imgHtml = imgSrc ? '<img class="card-img" src="'+imgSrc+'" alt="'+c.name+'" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">' : '';
  var fallback = '<span class="no-img" style="display:'+(imgSrc?'none':'block')+'">'+( currentSet==='surfing'?'🏄':currentSet==='cameo'?'🎭':currentSet==='hoothoot'?'🐦':'🦉' )+'</span>';
  var badges = '';
  if(c.special) badges+='<span class="badge b-rare">⭐ Rare</span>';
  if(c.promo) badges+='<span class="badge b-promo">Promo</span>';
  if(c.lang==='jp') badges+='<span class="badge b-jp">JP</span>';
  if(c.lang==='en') badges+='<span class="badge b-en">EN</span>';
  if(c.name&&c.name.includes('1st')) badges+='<span class="badge b-1st">1st Ed</span>';
  if(c.cameo) badges+='<span class="badge b-cameo">Cameo: '+c.cameo+'</span>';
  if(c.rarity&&c.rarity.includes('VMAX')) badges+='<span class="badge b-vmax">VMAX</span>';

  var buyLink = c.tcg || c.ebay || '#';
  var buyLabel = c.tcg ? '🛒 TCGPlayer' : '🛒 eBay';
  var pcBtn = c.pc ? '<a class="act-btn btn-pc" href="'+c.pc+'" target="_blank" onclick="event.stopPropagation()">📊 Price Guide</a>' : '<span class="act-btn btn-pc" style="opacity:0.3">No price guide</span>';
  var buyBtn = '<a class="act-btn btn-tcg" href="'+buyLink+'" target="_blank" onclick="event.stopPropagation()">'+buyLabel+'</a>';
  var ebayBtn = c.ebay&&c.tcg ? '<a class="act-btn btn-ebay" href="'+c.ebay+'" target="_blank" onclick="event.stopPropagation()">🟡 eBay</a>' : '';
  var checkBtn = '<button class="act-btn btn-check" onclick="toggleCollected(\''+c.id+'\',event)">'+(isColl?'✓ Mark as Needed':'✓ Mark as Collected')+'</button>';

  var detail = '<div class="card-detail">'
    +'<div class="detail-grid">'
    +'<div class="detail-box"><div class="d-label">NM Price</div><div class="d-val green">'+(c.nmPrice||'—')+'</div></div>'
    +'<div class="detail-box"><div class="d-label">Year</div><div class="d-val">'+(c.year||'—')+'</div></div>'
    +'<div class="detail-box"><div class="d-label">Rarity</div><div class="d-val" style="font-size:11px">'+(c.rarity||'—')+'</div></div>'
    +'<div class="detail-box"><div class="d-label">Language</div><div class="d-val">'+(c.lang==='en'?'🇺🇸 English':'🇯🇵 Japanese')+'</div></div>'
    +'</div>'
    +'<div class="detail-note">'+(c.note||'')+'</div>'
    +'<div class="action-grid">'+buyBtn+pcBtn+(ebayBtn||'')+checkBtn+'</div>'
    +'</div>';

  return '<div class="card-row'+(isColl?' collected':'')+(c.special?' special':'')+(isOpen?' open':'')+'" id="cr-'+c.id+'" onclick="toggleOpen(\''+c.id+'\')">'
    +'<div class="card-inner">'
    +'<div class="card-img-wrap">'+imgHtml+fallback+'</div>'
    +'<div class="card-info">'
    +'<div class="card-name">'+c.name+'</div>'
    +'<div class="card-set">'+c.set+'</div>'
    +'<div class="card-num">'+c.num+(c.rarity?' · '+c.rarity:'')+'</div>'
    +'<div class="card-price">'+(c.nmPrice||'')+'</div>'
    +'<div class="badges">'+badges+'</div>'
    +'</div>'
    +'<div class="card-right">'
    +'<div class="check-ring" onclick="toggleCollected(\''+c.id+'\',event)"><span class="check-mark">✓</span></div>'
    +'<div class="expand-hint">'+(isColl?'✓ Got it':'tap for info')+'</div>'
    +'</div>'
    +'</div>'
    +detail+'</div>';
}

function renderList(){
  var visible = getVisible();
  var list = document.getElementById('card-list');
  if(!visible.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">'+(currentSet==='surfing'?'🏄':currentSet==='cameo'?'🎭':'🦉')+'</div><div class="empty-text">No cards found</div><div class="empty-sub">Try a different filter</div></div>';
    return;
  }
  var html='';
  var lastLang='';
  var showSections = (currentFilter==='all'||currentFilter==='needed'||currentFilter==='collected'||currentFilter==='rare'||currentFilter==='promo');
  visible.forEach(function(c){
    if(showSections && c.lang!==lastLang){
      html+='<div class="section-lbl">'+(c.lang==='en'?'🇺🇸 English':'🇯🇵 Japanese')+'</div>';
      lastLang=c.lang;
    }
    html+=buildRow(c);
  });
  list.innerHTML=html;
}

function markAllVisible(state){
  var cs=collected[currentSet];
  getVisible().forEach(function(c){ state?cs.add(c.id):cs.delete(c.id); });
  save(); updateStats(); renderList();
}

function resetCurrent(){
  if(!confirm('Reset all progress for this set?')) return;
  collected[currentSet].clear(); save(); updateStats(); renderList();
}

function dismissBanner(){ document.getElementById('ib').style.display='none'; localStorage.setItem('ib-dismissed','1'); }

if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)&&!localStorage.getItem('ib-dismissed')){
  document.getElementById('ib').style.display='flex';
}
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }

renderList(); updateStats();
</script>
</body>
</html>
